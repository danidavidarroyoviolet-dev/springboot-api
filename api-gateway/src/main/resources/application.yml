server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  profiles:
    active: default
  cloud:
    gateway:
      routes:
        - id: polizas-route
          uri: http://polizas-service:8080
          predicates:
            - Path=/api/polizas/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: polizasCircuitBreaker
                fallbackUri: forward:/fallback/polizas
        
        - id: riesgos-route
          uri: http://polizas-service:8080
          predicates:
            - Path=/api/riesgos/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: polizasCircuitBreaker
                fallbackUri: forward:/fallback/polizas

        - id: core-mock-route
          uri: http://polizas-service:8080
          predicates:
            - Path=/api/core-mock/**
          filters:
            - StripPrefix=1

resilience4j:
  circuitbreaker:
    instances:
      polizasCircuitBreaker:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        registerHealthIndicator: true
  timelimiter:
    instances:
      polizasCircuitBreaker:
        timeoutDuration: 2s
---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
      port: 6379
